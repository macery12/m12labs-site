<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}M12Labs — AI-assisted Game Management Panel{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}M12Labs is an AI-assisted game management panel built for hosting providers and self-hosters. Features payment integrations and advanced billing cycles.{% endblock %}" />

  <!-- Open Graph -->
  <meta property="og:title" content="{% block og_title %}M12Labs{% endblock %}" />
  <meta property="og:description" content="{% block og_description %}AI-assisted game management panel for modern hosting.{% endblock %}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ settings.site_url }}{{ request.url.path }}" />
  <meta property="og:image" content="{{ settings.site_url }}/static/img/og-image.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/static/img/logo.png" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/static/css/site.css" />
</head>
<body>

<!-- ── Navigation ─────────────────────────────────────────────────── -->
<header class="nav-wrapper" role="banner">
  <nav class="nav container" aria-label="Main navigation">
    <a href="/" class="nav-brand" aria-label="M12Labs home">
      <img src="/static/img/logo.png" alt="M12Labs logo" class="nav-logo" width="32" height="32" />
      <span class="nav-brand-name">M12Labs</span>
    </a>

    <button class="nav-hamburger" id="nav-hamburger" aria-controls="nav-links" aria-expanded="false" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>

    <ul class="nav-links" id="nav-links" role="list">
      <li><a href="/" class="nav-link{% if request.url.path == '/' %} active{% endif %}">Home</a></li>
      <li><a href="/features" class="nav-link{% if request.url.path == '/features' %} active{% endif %}">Features</a></li>
      <li><a href="/screenshots" class="nav-link{% if request.url.path == '/screenshots' %} active{% endif %}">Screenshots</a></li>
      <li><a href="/support" class="nav-link{% if request.url.path == '/support' %} active{% endif %}">Support</a></li>
    </ul>

    <div class="nav-actions">
      <a href="{{ settings.github_url }}" class="nav-github" target="_blank" rel="noopener noreferrer" aria-label="GitHub repository">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
          <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
        </svg>
      </a>
      <a href="/discord" class="btn btn-primary" aria-label="Join M12Labs Discord">Join Discord</a>
      <a href="{{ settings.docs_url }}" class="btn btn-secondary" target="_blank" rel="noopener noreferrer">Get Started</a>
    </div>
  </nav>
</header>

<!-- ── Page content ───────────────────────────────────────────────── -->
<main id="main-content">
  {% block content %}{% endblock %}
</main>

<!-- ── Footer ────────────────────────────────────────────────────── -->
<footer class="footer" role="contentinfo">
  <div class="container footer-inner">
    <div class="footer-brand">
      <img src="/static/img/logo.png" alt="M12Labs logo" width="28" height="28" />
      <span>M12Labs</span>
    </div>
    <nav class="footer-links" aria-label="Footer navigation">
      <a href="/discord" class="footer-link">Discord</a>
      <a href="{{ settings.docs_url }}" class="footer-link" target="_blank" rel="noopener noreferrer">Docs</a>
      <a href="{{ settings.github_url }}" class="footer-link" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a href="/support" class="footer-link">Support</a>
    </nav>
    <p class="footer-copy">&copy; M12Labs. All rights reserved.</p>
  </div>
</footer>

<!-- ── Lightbox modal ────────────────────────────────────────────── -->
<div id="modal" class="modal" role="dialog" aria-modal="true" aria-label="Screenshot viewer" hidden>
  <div class="modal-overlay" id="modal-overlay"></div>
  <div class="modal-content">
    <button class="modal-close" id="modal-close" aria-label="Close screenshot viewer">&times;</button>
    <button class="modal-prev" id="modal-prev" aria-label="Previous screenshot">&#8592;</button>
    <img id="modal-img" src="" alt="" class="modal-image" />
    <button class="modal-next" id="modal-next" aria-label="Next screenshot">&#8594;</button>
  </div>
</div>

<script src="/static/js/site.js"></script>
</body>
</html>
