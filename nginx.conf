server {
  listen 80;
  listen [::]:80;
  server_name m12labs.net;

  root /var/www/m12labs-site/dist;
  index index.html;

  # Vite SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache immutable static assets generated by Vite
  location ~* \.(?:js|mjs|css|map|ico|gif|jpe?g|png|svg|webp|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # Do not cache HTML entrypoint
  location = /index.html {
    add_header Cache-Control "no-store";
  }

  location /health {
    default_type application/json;
    return 200 '{"status":"ok"}';
  }
}
